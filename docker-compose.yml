services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ioe_mock_exam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ioe_mock_exam"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ioe_mock_exam
      REDIS_URL: redis://redis:6379
      CLIENT_URL: https://modelentrance.kec.edu.np
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

  # ── Seeder (run on demand, never kept running) ───────────────────────────
  # Usage:  docker compose run --rm seeder
  # Only starts when explicitly called — ignored by regular `docker compose up`.
  seeder:
    profiles: ["seed"]
    build:
      context: ./server
      dockerfile: Dockerfile
      target: build          # reuse the build stage which has ALL deps (incl. ts-node-dev)
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ioe_mock_exam
    volumes:
      - ./scan:/scan:ro        # seed scripts read scan/ from the repo root
      - ./questions.json:/app/questions.json:ro
    working_dir: /app
    entrypoint: ["/bin/sh", "/app/starter-inner.sh"]

volumes:
  pgdata:
  redisdata:
  uploads:
