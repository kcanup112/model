# Development override: bind-mount source, run dev servers with hot reload.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ioe_mock_exam
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:5173
    volumes:
      - ./server:/app
      - backend_node_modules:/app/node_modules
      - uploads:/app/uploads
    command: npm run dev

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: http://backend:5000
    # !override replaces the inherited prod port (80:80) instead of merging.
    # Bind to IPv4 only (0.0.0.0) so Docker does NOT create a [::]:5173 IPv6
    # listener. The container network is IPv4-only, so an IPv6 listener makes
    # localhost (which Windows resolves to ::1) hang instead of failing over to
    # IPv4. With IPv4-only publishing, localhost:5173 works correctly.
    ports: !override
      - "0.0.0.0:5173:5173"
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  backend_node_modules:
  frontend_node_modules:
